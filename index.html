<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Conveyor demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  background:transparent;
}

/* ── BANNER SHELL ── */
.banner{
  width:100%;max-width:970px;
  height:130px;
  background:rgba(128,0,0,0.05);
  border:1px solid rgba(128,0,0,0.1);
  border-radius:6px;
  display:flex;flex-direction:column;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}

/* ── HEADER — full width centered ── */
.banner-header{
  height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  width:100%;
  padding:0 20px;
}
.banner-header span{
  font-size:15px;font-weight:700;color:#800000;
  letter-spacing:0.01em;
}

/* ── BODY ROW: conveyor + CTA ── */
.banner-body{
  flex:1;display:flex;align-items:stretch;overflow:hidden;
}

/* ── CONVEYOR STAGE ── */
.stage{
  flex:1;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
}
.stage::before,.stage::after{
  content:'';position:absolute;top:0;bottom:0;width:48px;z-index:10;pointer-events:none;
}
.stage::before{left:0;background:linear-gradient(90deg,rgba(255,248,248,0.95),transparent)}
.stage::after{right:0;background:linear-gradient(270deg,rgba(255,248,248,0.95),transparent)}

/* ── FOOTER — full width centered ── */
.banner-footer{
  height:22px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 10px 0 10px;
  width:100%;
}
.footer-left,.footer-right{flex-shrink:0}
.footer-mid{
  position:absolute;left:0;right:0;
  text-align:center;
  font-size:9px;color:rgba(128,0,0,0.45);
  letter-spacing:0.08em;text-transform:uppercase;
  pointer-events:none;
}
.footer-left,.footer-right{flex-shrink:0}
.footer-mid{
  flex:1;text-align:center;
  font-size:9px;color:rgba(128,0,0,0.45);
  letter-spacing:0.08em;text-transform:uppercase;
}
.footer-q{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;
  background:rgba(128,0,0,0.1);border:none;
  color:#800000;font-size:10px;font-weight:700;font-style:italic;
  font-family:Georgia,serif;text-decoration:none;cursor:pointer;
  transition:background 0.2s;
}
.footer-q:hover{background:rgba(128,0,0,0.22)}
.footer-meer{
  font-family:Arial,sans-serif;font-size:9.5px;font-weight:700;
  color:#800000;text-decoration:none;
  border-bottom:1px solid rgba(128,0,0,0.25);
  padding-bottom:1px;letter-spacing:0.02em;
  transition:border-color 0.2s,color 0.2s;
}
.footer-meer:hover{color:#a30000;border-color:#a30000}

/* ── TRACK ── */
.track{
  display:flex;align-items:center;
  position:absolute;
  animation:conveyor 56s linear infinite;
}
@keyframes conveyor{
  0%  {transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
.track:hover{animation-play-state:paused}

/* ── NODE ── */
.node{
  display:flex;align-items:center;gap:9px;
  padding:0 14px;height:52px;border-radius:26px;
  width:175px;flex-shrink:0;
  cursor:pointer;
  transition:box-shadow 0.4s,background 0.4s;
  position:relative;
}
.node:hover{transform:translateY(-1px)}
.node-icon{font-size:18px;line-height:1;flex-shrink:0}
.node-text{display:flex;flex-direction:column;min-width:0}
.node-name{font-size:12px;font-weight:700;color:#333;white-space:nowrap;line-height:1.2;overflow:hidden;text-overflow:ellipsis}
.node-sub{font-size:9.5px;color:#888;white-space:nowrap;line-height:1.4;overflow:hidden;text-overflow:ellipsis}

/* ── INFO BADGE ── */
.node::after{
  content:'i';
  position:absolute;
  top:5px;right:8px;
  width:14px;height:14px;
  border-radius:50%;
  background:rgba(128,0,0,0.12);
  color:#800000;
  font-size:9px;font-weight:700;font-style:italic;font-family:Georgia,serif;
  line-height:14px;text-align:center;
  opacity:0.45;
  transition:opacity 0.2s, background 0.2s;
}
.node:hover::after{opacity:1;background:rgba(128,0,0,0.22)}

.n-nlfr{background:#f5f0ff;border:1px solid rgba(100,0,160,0.15)}
.n-if  {background:#fff5f5;border:1px solid rgba(128,0,0,0.15)}
.n-cc  {background:#f5f8ff;border:1px solid rgba(0,60,160,0.12)}
.n-df  {background:#f5fff8;border:1px solid rgba(0,120,60,0.12)}
.n-upd {background:#fffbf0;border:1px solid rgba(160,100,0,0.15)}

.n-nlfr.glow{box-shadow:0 0 0 3px rgba(100,0,160,0.22);background:#ece0ff}
.n-if.glow  {box-shadow:0 0 0 3px rgba(128,0,0,0.2); background:#ffe8e8}
.n-cc.glow  {box-shadow:0 0 0 3px rgba(0,60,160,0.18);background:#ddeaff}
.n-df.glow  {box-shadow:0 0 0 3px rgba(0,120,60,0.18);background:#d8ffea}
.n-upd.glow {box-shadow:0 0 0 3px rgba(160,100,0,0.2);background:#fff0c8}

/* ── CONNECTOR ── */
.conn{
  flex-shrink:0;width:72px;height:28px;
  position:relative;display:flex;align-items:center;
}
.conn-line{
  position:absolute;left:0;right:0;height:2px;border-radius:1px;
  background:rgba(128,0,0,0.07);overflow:hidden;
}
.conn-shimmer{
  position:absolute;top:0;left:-80%;
  width:80%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(128,0,0,0.55),transparent);
  border-radius:1px;
}
.conn-arrow{
  position:absolute;right:0;
  font-size:9px;color:rgba(128,0,0,0.3);
}

/* ── CTA ── */
.cta-wrap{
  width:155px;flex-shrink:0;
  padding:0 12px 0 8px;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:center;
}
.cta-btn{
  display:inline-block;background:#800000;color:#fff;
  font-size:12px;font-weight:bold;text-decoration:none;font-family:sans-serif;
  padding:8px 14px;border-radius:4px;white-space:nowrap;
  border:1px solid #600000;transition:background 0.2s;
}
.cta-btn:hover{background:#a30000}

/* ── EXPAND PANEL ── */
#banner-wrap{
  width:100%;max-width:970px;height:130px;overflow:hidden;
  transition:height 0.35s cubic-bezier(0.4,0,0.2,1);
  margin:0 auto;
}
#banner-wrap.expanded{height:270px}

.expand-panel{
  width:100%;height:140px;
  border-top:1px solid rgba(128,0,0,0.1);background:rgba(128,0,0,0.03);
  display:flex;align-items:center;
  opacity:0;transition:opacity 0.25s 0.2s;position:relative;
}
#banner-wrap.expanded .expand-panel{opacity:1}

.panel-close{
  position:absolute;top:12px;right:16px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(128,0,0,0.08);border:none;
  cursor:pointer;font-size:12px;color:#800000;
  display:flex;align-items:center;justify-content:center;
}
.panel-close:hover{background:rgba(128,0,0,0.18)}
.panel-icon-wrap{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;margin:0 20px 0 28px;
}
.panel-body{flex:1;padding-right:60px}
.panel-title{font-size:15px;font-weight:700;color:#800000;margin-bottom:6px;display:block}
.panel-text{font-size:11.5px;color:#555;line-height:1.7}
.panel-link{
  display:inline-block;margin-top:10px;
  font-size:11px;font-weight:700;color:#800000;
  text-decoration:none;border-bottom:1px solid rgba(128,0,0,0.3);padding-bottom:1px;
}
</style>
</head>
<body>

<div id="banner-wrap">
  <div class="banner">

      <div class="banner-header">
        <span>Wonen en Leven in Frankrijk</span>
      </div>

      <div class="banner-body">
        <div class="stage">
          <div class="track" id="track"></div>
        </div>

        <!-- CTA -->
        <div class="cta-wrap">
          <a class="cta-btn" href="https://infofrankrijk.com/abonnement/" target="_blank">Word abonnee →</a>
        </div>
      </div>

      <div class="banner-footer">
        <span class="footer-left">
          <a class="footer-meer" href="javascript:void(0)"
             onclick="window.open('https://www.nederlanders.fr/Infofrankrijk-instrumenten','ifr_pres','width=1100,height=700,scrollbars=yes,resizable=yes')">Lees meer…</a>
        </span>
        <span class="footer-mid">Nederlanders.fr &nbsp;·&nbsp; Infofrankrijk.com &nbsp;·&nbsp; Sinds 2001</span>
        <span class="footer-right"></span>
      </div>

  </div>

  <!-- EXPAND PANEL -->
  <div class="expand-panel" id="expand-panel">
    <button class="panel-close" id="close-btn">✕</button>
    <div class="panel-icon-wrap" id="panel-icon-wrap">☕</div>
    <div class="panel-body">
      <span class="panel-title" id="panel-title"></span>
      <p class="panel-text" id="panel-text"></p>
      <a class="panel-link" id="panel-link" href="#" target="_blank"></a>
    </div>
  </div>
</div>

<script>
const NODES = [
  { key:'nlfr', cls:'n-nlfr', icon:'💬', name:'Nederlanders.fr',   sub:'Vraag & ervaring',
    title:'Nederlanders.fr',
    text:'Sinds 2001 het forum voor Nederlandstaligen in Frankrijk. 25.000 geregistreerde gebruikers — van eenmalige bezoekers tot trouwe vaste gezichten. Bijna 30.000 discussies, honderdduizenden reacties. De kennis staat er nog. En de actieve leden ook.',
    url:'https://nederlanders.fr', lbl:'Ga naar het forum →' },
  { key:'if',   cls:'n-if',   icon:'📰', name:'Infofrankrijk',      sub:'Achtergrond & context',
    title:'Infofrankrijk',
    text:'Diepgaande artikelen, uitgebreide dossiers, interactieve rekenmodules en scenariomodellen over o.a. wonen, belasting, klussen, zorg en leven in Frankrijk. Zonder adverteerders, zonder gesponsorde inhoud.',
    url:'https://infofrankrijk.com', lbl:'Ga naar Infofrankrijk →' },
  { key:'cc',   cls:'n-cc',   icon:'☕', name:'Café Claude',         sub:'Stel de vervolgvraag',
    title:'Café Claude',
    text:'AI-assistent georganiseerd in 6 domeinen: Ondernemen, Wonen & Kopen, Geld & Belasting, Verzekeren, Gezondheid & Zorg en Bureaucratie & Papieren. 635 gecheckte onderwerpen, elk voorzien van bronvermelding en kwaliteitsscore. Groeit door naar meer domeinen.',
    url:'https://cafeclaude.fr', lbl:'Open Café Claude →' },
  { key:'df',   cls:'n-df',   icon:'📁', name:'DossierFrankrijk',   sub:'Bewaar het antwoord',
    title:'DossierFrankrijk',
    text:'Uw persoonlijk archief. Antwoorden van Café Claude en de situationele output van een groeiend aantal instrumenten zoals het Financieel Kompas worden hier opgeslagen. Met versheidscontrole — u ziet meteen wat actueel is en wat vernieuwd moet worden.',
    url:'https://dossierfrankrijk.nl', lbl:'Open uw Dossier →' },
  { key:'upd',  cls:'n-upd',  icon:'🔄', name:'DF actualiseren',    sub:'Bij veranderende regelgeving',
    title:'Automatische updates',
    text:'Uw opgeslagen antwoorden in DossierFrankrijk worden gecontroleerd op actualiteit. Verandert wet- of regelgeving in Frankrijk? Het systeem signaleert welke van uw dossiers herzien moet worden.',
    url:'https://dossierfrankrijk.nl', lbl:'Meer over DossierFrankrijk →' },
];

// Build track HTML — doubled for seamless loop
function buildNode(n){
  return `<div class="node ${n.cls}" data-key="${n.key}">
    <span class="node-icon">${n.icon}</span>
    <div class="node-text">
      <span class="node-name">${n.name}</span>
      <span class="node-sub">${n.sub}</span>
    </div>
  </div>`;
}

function buildConn(delay){
  return `<div class="conn">
    <div class="conn-line">
      <div class="conn-shimmer" style="animation:shimmove 3.5s ease-in-out infinite ${delay}s"></div>
    </div>
    <span class="conn-arrow">▶</span>
  </div>`;
}

// inject shimmer keyframes
const style = document.createElement('style');
style.textContent = `@keyframes shimmove{
  0%  {left:-80%;opacity:0}
  15% {opacity:1}
  85% {opacity:1}
  100%{left:110%;opacity:0}
}`;
document.head.appendChild(style);

const track = document.getElementById('track');
let html = '';
const totalDelay = 3.5; // shimmer cycle
// build sequence twice
for(let pass=0; pass<2; pass++){
  NODES.forEach((n,i)=>{
    html += buildNode(n);
    const delay = ((i * totalDelay) / NODES.length + pass * totalDelay).toFixed(2);
    html += buildConn(delay);
  });
}
track.innerHTML = html;

// set track width so animation works
requestAnimationFrame(()=>{
  const trackW = track.scrollWidth;
  track.style.width = trackW + 'px';
});

// ── GLOW sequence (C) ──
let glowIdx = 0;
let glowNodes = [];

function updateGlow(){
  glowNodes = document.querySelectorAll('.track .node');
  glowNodes.forEach(n=>n.classList.remove('glow'));
  // light up every nth node across both copies (same position)
  const perPass = NODES.length;
  [glowIdx, glowIdx + perPass].forEach(i=>{
    if(glowNodes[i]) glowNodes[i].classList.add('glow');
  });
  glowIdx = (glowIdx + 1) % perPass;
}

setInterval(updateGlow, 2200);
updateGlow();

// ── PANEL ──
const wrap = document.getElementById('banner-wrap');
const INFO = {};
NODES.forEach(n=>INFO[n.key]=n);

function openPanel(key){
  const d = INFO[key];
  if(!d) return;
  document.getElementById('panel-icon-wrap').textContent = d.icon;
  document.getElementById('panel-icon-wrap').style.background = 
    {nlfr:'#f5f0ff',if:'#fff5f5',cc:'#f5f8ff',df:'#f5fff8',upd:'#fffbf0'}[key];
  document.getElementById('panel-title').textContent = d.title;
  document.getElementById('panel-text').textContent = d.text;
  const lnk = document.getElementById('panel-link');
  lnk.href = d.url; lnk.textContent = d.lbl;
  wrap.classList.add('expanded');
  wrap.style.overflow = 'visible';
  document.body.style.height = '272px';
  try{window.parent.postMessage({iframeHeight:272},'*')}catch(e){}
}

function closePanel(){
  wrap.classList.remove('expanded');
  wrap.style.overflow = 'hidden';
  document.body.style.height = '130px';
  try{window.parent.postMessage({iframeHeight:132},'*')}catch(e){}
}

document.getElementById('track').addEventListener('click',e=>{
  const node = e.target.closest('.node');
  if(!node) return;
  openPanel(node.dataset.key);
});

document.getElementById('close-btn').addEventListener('click', closePanel);
</script>
</body>
</html>
